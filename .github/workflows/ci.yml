name: CI

on:
  push:
    branches: [master, main]
  pull_request:

permissions:
  contents: read

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        node: ['22', '24']
    steps:
      - uses: actions/checkout@v4

      # pnpm must exist before setup-node tries to compute its cache key,
      # so the action-setup step has to run BEFORE setup-node (not after,
      # and not via `corepack enable` only — setup-node's pnpm detection
      # doesn't pick up corepack shims). v4 of the action reads the
      # version from `packageManager` in package.json — don't pass an
      # explicit `version:` input or it complains about conflicts.
      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node }}
          cache: pnpm

      - run: pnpm install --frozen-lockfile=false

      - run: pnpm -r build

      - run: pnpm -r test
